name: CI/CD PyInstaller Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04   # ✅ FIX: compatibilidade glibc
            name: linux
            exe_suffix: ""
          - os: windows-latest
            name: windows
            exe_suffix: ".exe"

    steps:
      # ============================================================
      # 1. CHECKOUT
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================================
      # 2. SETUP PYTHON
      # ============================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ============================================================
      # 3. INSTALL DEPENDENCIES (NO VENV)
      # ============================================================
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install -r requirements.txt

      # ============================================================
      # 4. BUILD (LINUX - UBUNTU 22.04)
      # ============================================================
      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          cd src

          python -m PyInstaller --onefile --windowed \
            --name simple_project_generator \
            --add-data "simple_project_generator/icons:icons" \
            --add-data "simple_project_generator/data:data" \
            --collect-all PyQt5 \
            program_launcher.py

      # ============================================================
      # 5. BUILD (WINDOWS)
      # ============================================================
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd src

          python -m PyInstaller --onefile --windowed `
            --name simple_project_generator `
            --add-data "simple_project_generator/icons;icons" `
            --add-data "simple_project_generator/data;data" `
            --collect-all PyQt5 `
            program_launcher.py

      # ============================================================
      # 6. ARTIFACT (CI BUILDS - 1 DAY EXPIRY)
      # ============================================================
      - name: Upload CI artifact (expires in 1 day)
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: simple_project_generator-${{ matrix.name }}
          path: src/dist/
          retention-days: 1

      # ============================================================
      # 7. RELEASE (ONLY WHEN TAG IS CREATED)
      # ============================================================
      - name: Upload Release artifact (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
