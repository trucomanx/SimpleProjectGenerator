name: CI/CD PyInstaller Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            exe_suffix: ""
          - os: windows-latest
            name: windows
            exe_suffix: ".exe"

    steps:
      # ============================================================
      # 1. CHECKOUT
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================================
      # 2. SETUP PYTHON
      # ============================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ============================================================
      # 3. SYSTEM DEPENDENCIES (LINUX ONLY)
      # ============================================================
      - name: Install Linux system dependencies (Qt/xcb fix)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libx11-xcb1 \
            libglib2.0-0 \
            libgl1 \
            libegl1

      # ============================================================
      # 4. INSTALL PYTHON DEPENDENCIES
      # ============================================================
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install -r requirements.txt

      # ============================================================
      # 5. BUILD (LINUX)
      # ============================================================
      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd src

          python -m PyInstaller --onefile --windowed \
            --name simple_project_generator \
            --add-data "simple_project_generator/icons:icons" \
            --add-data "simple_project_generator/data:data" \
            --collect-all PyQt5 \
            program_launcher.py

      # ============================================================
      # 6. BUILD (WINDOWS)
      # ============================================================
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd src

          python -m PyInstaller --onefile --windowed `
            --name simple_project_generator `
            --add-data "simple_project_generator/icons;icons" `
            --add-data "simple_project_generator/data;data" `
            --collect-all PyQt5 `
            program_launcher.py

      # ============================================================
      # 7. ARTIFACT (CI BUILDS - 1 DAY)
      # ============================================================
      - name: Upload CI artifact (expires in 1 day)
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: simple_project_generator-${{ matrix.name }}
          path: src/dist/
          retention-days: 1

      # ============================================================
      # 8. RELEASE (ON TAG)
      # ============================================================
      - name: Upload Release artifact (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
